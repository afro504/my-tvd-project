


<form method="post" class="js-indicator-delete-form" action="{% url 'delete_indicator' indicator.pk %}">
  {% csrf_token %}
  <p>Are you sure you want to delete <strong>{{ indicator.indicator_name }}</strong>?</p>
  <button type="submit" class="btn btn-danger">Yes, delete</button>
  <button type="button" class="btn btn-secondary" data-dismiss="modal">Cancel</button>
</form>
