{% extends "mytvddata/cover/base.html" %}

{% block content %}
<div class="container mt-4">
  <h3>Import Indicators from Excel</h3>

  <!-- Formulaire d’upload -->
  <form method="post" enctype="multipart/form-data" action="{% url 'import_indicator' %}">
    {% csrf_token %}
    <div class="form-group">
      <label for="excel_file">Select Excel file (.xlsx)</label>
      <input type="file" name="excel_file" id="excel_file" class="form-control" required>
    </div>
    <button type="submit" class="btn btn-primary mt-2">Import</button>
    <a href="{% url 'list_indicator' %}" class="btn btn-secondary mt-2">Cancel</a>
  </form>

  <!-- Message de succès ou d’erreur -->
  {% if messages %}
    <div class="mt-3">
      {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">{{ message }}</div>
      {% endfor %}
    </div>
  {% endif %}
</div>
{% endblock %}
