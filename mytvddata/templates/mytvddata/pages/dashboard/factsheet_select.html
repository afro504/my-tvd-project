{% extends "mytvddata/cover/base.html" %}
{% load static %}

{% block content %}
<div class="container my-5">
  <!-- Main Title -->
  <div class="text-center mb-4">
    <h2 class="fw-bold text-primary border-bottom pb-2" style="font-size:2rem;">
      <i class="fas fa-notes-medical me-2"></i> Select a Disease
    </h2>
    <p class="text-muted" style="font-size:1.1rem;">
      Explore regional factsheets by condition
    </p>
  </div>

  <!-- Disease List -->
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <ul class="list-group shadow-sm">
        {% for sub in subcomponents %}
          <li class="list-group-item d-flex justify-content-between align-items-center"
              style="font-size:1.1rem;">
            <span class="fw-bold text-dark">
              <i class="fas fa-virus me-2 text-danger"></i> {{ sub.subcomponent_name }}
            </span>
            <a href="{% url 'regional_factsheet_results' sub.id %}" 
               class="btn btn-outline-primary btn-sm fw-bold">
              <i class="fas fa-chart-line me-1"></i> View Factsheet
            </a>
          </li>
        {% endfor %}
      </ul>
    </div>
  </div>
</div>
{% endblock %}
