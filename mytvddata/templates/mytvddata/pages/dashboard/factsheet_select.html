{% extends "mytvddata/cover/base.html" %}
{% load static %}

{% block content %}
<div class="container my-5">
  <!-- Titre principal -->
  <div class="text-center mb-4">
    <h2 class="fw-bold text-primary border-bottom pb-2" style="font-size:2rem;">
      📑 Sélectionnez une maladie
    </h2>
    <p class="text-muted" style="font-size:1.1rem;">
      Explorez les factsheets régionaux par pathologie
    </p>
  </div>

  <!-- Liste des maladies en style CDC -->
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <ul class="list-group shadow-sm">
        {% for sub in subcomponents %}
          <li class="list-group-item d-flex justify-content-between align-items-center"
              style="font: size 2px;">
            <span class="fw-bold text-dark">{{ sub.subcomponent_name }}</span>
            <a href="{% url 'regional_factsheet_results' sub.id %}" 
               class="btn btn-outline-primary btn-sm fw-bold">
              📊 Voir le factsheet
            </a>
          </li>
        {% endfor %}
      </ul>
    </div>
  </div>
</div>
{% endblock %}
