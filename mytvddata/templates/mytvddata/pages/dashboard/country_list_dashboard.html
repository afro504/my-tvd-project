{% extends "mytvddata/cover/base.html" %}
{% load static %}

{% block content %}

<div class="container my-4">
    <!-- Main Title -->
    <h2 class="fw-bold text-primary">🌍 Select a Country</h2>

    <!-- Search Bar -->
    <div class="mb-4">
        <input type="text" id="searchInput" class="form-control" placeholder="🔎 Search for a country...">
    </div>

    <!-- Country List -->
    <div class="row" id="countryList">
    {% for country in countries %}
    <div class="col-md-3 mb-4 country-card">
        <div class="card shadow-sm h-100 text-center">
            <!-- Flag based on code -->
            <span class="fi fi-{{ country.flag|lower }} mb-3" style="font-size:3rem;"></span>
            
            <div class="card-body">
                <h5 class="card-title">{{ country.name }}</h5>
                <a href="{% url 'country_dashboard' country.pk %}" class="btn btn-outline-primary btn-sm">
                    View Profile
                </a>
            </div>
        </div>
    </div>
    {% empty %}
    <p class="text-muted">No countries available</p>
    {% endfor %}
    </div>
</div>

<!-- JavaScript for filtering -->
<script>
document.getElementById("searchInput").addEventListener("keyup", function() {
    let filter = this.value.toLowerCase();
    let cards = document.querySelectorAll("#countryList .country-card");

    cards.forEach(card => {
        let title = card.querySelector(".card-title").textContent.toLowerCase();
        card.style.display = title.includes(filter) ? "" : "none";
    });
});
</script>
{% endblock %}
